<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Konum Seç</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#14b866",
                        "background-light": "#f6f8f7",
                        "background-dark": "#112119",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col">
<!-- TopAppBar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="flex size-12 shrink-0 items-center justify-start text-zinc-900 dark:text-white">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-zinc-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Konum Seç</h2>
<div class="flex size-12 shrink-0"></div> <!-- Spacer for centering title -->
</div>
<!-- BodyText -->
<p class="text-zinc-600 dark:text-zinc-400 text-base font-normal leading-normal pb-3 pt-1 px-4">Namaz vakitleri için şehir veya konum seçin.</p>
<!-- SingleButton -->
<div class="flex px-4 py-3">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 flex-1 bg-primary text-white gap-2 pl-5 text-base font-bold leading-normal tracking-[0.015em]">
<span class="material-symbols-outlined">my_location</span>
<span class="truncate">Konumu Otomatik Algıla (GPS)</span>
</button>
</div>
<!-- SectionHeader -->
<h3 class="text-zinc-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2 pt-4">Veya Şehri Manuel Seç</h3>
<!-- SearchBar -->
<div class="px-4 py-3 sticky top-[72px] bg-background-light dark:bg-background-dark z-10">
<label class="flex flex-col min-w-40 h-12 w-full">
<div class="flex w-full flex-1 items-stretch rounded-lg h-full">
<div class="text-zinc-500 dark:text-primary/70 flex border-none bg-zinc-200 dark:bg-background-dark/50 items-center justify-center pl-4 rounded-l-lg border-r-0">
<span class="material-symbols-outlined">search</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-zinc-900 dark:text-white focus:outline-0 focus:ring-0 border-none bg-zinc-200 dark:bg-background-dark/50 focus:border-none h-full placeholder:text-zinc-500 dark:placeholder:text-primary/70 px-4 rounded-l-none border-l-0 pl-2 text-base font-normal leading-normal" placeholder="Şehir adı ile ara..." value=""/>
</div>
</label>
</div>
<!-- Location List -->
<div class="flex flex-col px-4 space-y-2 pb-4">
<!-- List Item - Selected -->
<div class="flex w-full cursor-pointer items-center justify-between rounded-lg bg-primary/20 p-4">
<div class="flex flex-col">
<p class="font-bold text-base text-primary">İstanbul</p>
<p class="text-sm text-primary/80">Türkiye</p>
</div>
<span class="material-symbols-outlined text-primary">check_circle</span>
</div>
<!-- List Item -->
<div class="flex w-full cursor-pointer items-center justify-between rounded-lg p-4 hover:bg-zinc-200 dark:hover:bg-zinc-800">
<div class="flex flex-col">
<p class="font-bold text-base text-zinc-900 dark:text-white">Ankara</p>
<p class="text-sm text-zinc-600 dark:text-zinc-400">Türkiye</p>
</div>
</div>
<!-- List Item -->
<div class="flex w-full cursor-pointer items-center justify-between rounded-lg p-4 hover:bg-zinc-200 dark:hover:bg-zinc-800">
<div class="flex flex-col">
<p class="font-bold text-base text-zinc-900 dark:text-white">İzmir</p>
<p class="text-sm text-zinc-600 dark:text-zinc-400">Türkiye</p>
</div>
</div>
<!-- List Item -->
<div class="flex w-full cursor-pointer items-center justify-between rounded-lg p-4 hover:bg-zinc-200 dark:hover:bg-zinc-800">
<div class="flex flex-col">
<p class="font-bold text-base text-zinc-900 dark:text-white">Bursa</p>
<p class="text-sm text-zinc-600 dark:text-zinc-400">Türkiye</p>
</div>
</div>
<!-- List Item -->
<div class="flex w-full cursor-pointer items-center justify-between rounded-lg p-4 hover:bg-zinc-200 dark:hover:bg-zinc-800">
<div class="flex flex-col">
<p class="font-bold text-base text-zinc-900 dark:text-white">Antalya</p>
<p class="text-sm text-zinc-600 dark:text-zinc-400">Türkiye</p>
</div>
</div>
<!-- List Item -->
<div class="flex w-full cursor-pointer items-center justify-between rounded-lg p-4 hover:bg-zinc-200 dark:hover:bg-zinc-800">
<div class="flex flex-col">
<p class="font-bold text-base text-zinc-900 dark:text-white">Mekke</p>
<p class="text-sm text-zinc-600 dark:text-zinc-400">Suudi Arabistan</p>
</div>
</div>
<!-- List Item -->
<div class="flex w-full cursor-pointer items-center justify-between rounded-lg p-4 hover:bg-zinc-200 dark:hover:bg-zinc-800">
<div class="flex flex-col">
<p class="font-bold text-base text-zinc-900 dark:text-white">Medine</p>
<p class="text-sm text-zinc-600 dark:text-zinc-400">Suudi Arabistan</p>
</div>
</div>
</div>
</div>
</body></html>
